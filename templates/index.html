<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Q&A (RAG)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .status {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .status.ready {
            background-color: #d4edda;
            color: #155724;
        }
        .status.not-ready {
            background-color: #f8d7da;
            color: #721c24;
        }
        .input-group {
            display: flex;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px 0 0 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 0 5px 5px 0;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .btn-ingest {
            background-color: #28a745;
            border-radius: 5px;
            width: 100%;
            margin-bottom: 20px;
        }
        .btn-ingest:hover {
            background-color: #218838;
        }
        .response-area {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 15px;
            border-radius: 5px;
            min-height: 100px;
            white-space: pre-wrap;
        }
        .loading {
            text-align: center;
            display: none;
            color: #6c757d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Document Q&A</h1>
    
    {% if retriever_ready %}
    <div class="status ready" id="status-bar">Status: System is Ready. Ask a question!</div>
    {% else %}
    <div class="status not-ready" id="status-bar">Status: System is NOT Ready. Please ingest documents first.</div>
    {% endif %}

    <button class="btn-ingest" onclick="ingestDocuments()">Ingest/Process Documents</button>

    <div class="input-group">
        <input type="text" id="question" placeholder="Ask a question about your documents...">
        <button onclick="askQuestion()">Ask</button>
    </div>

    <div class="loading" id="loading">Thinking...</div>
    
    <div class="response-area" id="response">
        Your answer will appear here...
    </div>
</div>

<script>
    async function ingestDocuments() {
        const statusBar = document.getElementById('status-bar');
        const btn = document.querySelector('.btn-ingest');
        
        btn.disabled = true;
        btn.innerText = "Processing Documents... Please wait.";
        
        try {
            const response = await fetch('/ingest', { method: 'POST' });
            const data = await response.json();
            
            if (data.status === 'success') {
                statusBar.className = 'status ready';
                statusBar.innerText = 'Status: System is Ready. Ask a question!';
                alert('Documents processed successfully!');
            } else {
                alert('Error: ' + data.message);
            }
        } catch (error) {
            alert('An error occurred during ingestion.');
        } finally {
            btn.disabled = false;
            btn.innerText = "Ingest/Process Documents";
        }
    }

    async function askQuestion() {
        const questionInput = document.getElementById('question');
        const responseArea = document.getElementById('response');
        const loading = document.getElementById('loading');
        const question = questionInput.value.trim();

        if (!question) {
            alert('Please enter a question.');
            return;
        }

        responseArea.innerText = '';
        loading.style.display = 'block';

        try {
            const response = await fetch('/ask', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ query: question })
            });
            const data = await response.json();
            
            loading.style.display = 'none';
            responseArea.innerText = data.answer;
        } catch (error) {
            loading.style.display = 'none';
            responseArea.innerText = 'Error: Could not fetch answer.';
        }
    }
</script>

</body>
</html>
